<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .card {
            width: 300px;
            background: white;
            padding: 20px;
            margin: 100px auto;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 4px 10px gray;
        }

        .name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        .description {
            font-size: 16px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="name">John Doe</div>
    <div class="description">
        Web developer who loves creating simple and beautiful websites using HTML and CSS.
    </div>
</div>

</body>
</html>
