
<!DOCTYPE html>
<html>
<head>
    <title>My Web Page</title>

    <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: darkblue;
            text-align: center;
            font-family: Georgia;
        }

        p {
            color: darkgreen;
            font-size: 18px;

    <p>

    </p>

</body>
</html>
