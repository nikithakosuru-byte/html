
<!DOCTYPE html>
<html>
<head>
    <title>Responsive Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .container {
            display: flex;
            padding: 20px;
        }

        .box {
            flex: 1;
            padding: 20px;
            margin: 10px;
            background-color: lightgray;
            text-align: center;
        }

        /* Responsive for small screens */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>My Responsive Webpage</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="box">
        <h2>Section 1</h2>
        <p>This is the first section of the responsive webpage.</p>
    </div>

    <div class="box">
        <h2>Section 2</h2>
        <p>This is the second section of the responsive webpage.</p>
    </div>

    <div class="box">
        <h2>Section 3</h2>
        <p>This is the third section of the responsive webpage.</p>
    </div>
</div>

</body>
</html>
